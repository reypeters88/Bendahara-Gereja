<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <title>Bendahara Gereja Advent (GMAHK) - Aplikasi Arus Kas & Sync Google Sheets</title>
  <meta name="description" content="Aplikasi WebApp Bendahara Gereja Masehi Advent Hari Ketujuh dengan alokasi persentase otomatis (Persepuluhan 100% DSKT, Persembahan Terpadu 50/50, Khusus, Pembangunan) & backup Google Sheets terpisah." />
  <meta name="theme-color" content="#1e3a8a" />
  <link rel="icon" type="image/png" href="gmahk.png" />
  <link rel="manifest" href="manifest.json" />
  
  <!-- CSS Premium Styling -->
  <link rel="stylesheet" href="css/style.css" />

  <!-- CDN Pustaka Ringan -->
  <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div id="app-container">
    <!-- Desktop & Tablet Sidebar Navigation -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-logo" style="padding: 2px; overflow: hidden;">
          <img src="gmahk.png" alt="Logo GMAHK" style="width: 100%; height: 100%; object-fit: cover; border-radius: var(--radius-md);" />
        </div>
        <div class="brand-text">
          <h1>BENDAHARA JEMAAT</h1>
          <span>GMAHK / ADVENT</span>
        </div>
      </div>

      <nav class="nav-menu">
        <a href="#" class="nav-item active" data-view="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span>Dashboard & Arus Kas</span>
        </a>
        <a href="#" class="nav-item" data-view="pemasukan">
          <i data-lucide="plus-circle"></i>
          <span>Pencatatan Pemasukan</span>
        </a>
        <a href="#" class="nav-item" data-view="pengeluaran">
          <i data-lucide="minus-circle"></i>
          <span>Pencatatan Pengeluaran</span>
        </a>
        <a href="#" class="nav-item" data-view="kirim-dskt">
          <i data-lucide="send"></i>
          <span>Setor / Kirim DSKT</span>
        </a>
        <a href="#" class="nav-item" data-view="laporan">
          <i data-lucide="file-spreadsheet"></i>
          <span>Laporan & Ekspor Excel</span>
        </a>
        <a href="#" class="nav-item" data-view="pengaturan">
          <i data-lucide="settings"></i>
          <span>Pengaturan & Google Sync</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <div class="church-info-badge">
          <i data-lucide="shield-check"></i>
          <div style="font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis;">
            <div style="font-weight: 700; color: hsl(var(--text-primary)); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="sidebar-church-name">Gereja Advent Jemaat Pusat</div>
            <div style="color: hsl(var(--text-muted)); font-size: 0.72rem;">Sistem Perbendaharaan v1.0</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="main-content">
      <!-- Top Sticky Bar -->
      <header class="topbar">
        <div class="page-title-area">
          <button class="icon-btn" id="btn-mobile-menu" style="display: none; margin-right: 8px;" aria-label="Menu">
            <i data-lucide="menu"></i>
          </button>
          <h2 id="topbar-page-title">Dashboard & Arus Kas</h2>
        </div>

        <div class="topbar-actions">
          <div id="sync-status-badge" class="sync-badge pending">
            <i data-lucide="cloud-off" style="width: 14px; height: 14px;"></i>
            <span>Offline / Lokal</span>
          </div>
          
          <button class="icon-btn" id="btn-theme-toggle" title="Ganti Mode Gelap / Terang">
            <i data-lucide="sun"></i>
          </button>
        </div>
      </header>

      <!-- Dynamic View Container -->
      <div id="view-container" class="content-area">
        <!-- Konten Halaman akan dimuat otomatis oleh JavaScript -->
      </div>
    </main>
  </div>

  <!-- Mobile & Tablet Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="#" class="bottom-nav-item active" data-view="dashboard">
      <i data-lucide="layout-dashboard"></i>
      <span>Dashboard</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="pemasukan">
      <i data-lucide="plus-circle"></i>
      <span>Masuk</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="pengeluaran">
      <i data-lucide="minus-circle"></i>
      <span>Keluar</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="kirim-dskt">
      <i data-lucide="send"></i>
      <span>DSKT</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="laporan">
      <i data-lucide="file-spreadsheet"></i>
      <span>Laporan</span>
    </a>
    <a href="#" class="bottom-nav-item" data-view="pengaturan">
      <i data-lucide="settings"></i>
      <span>Atur</span>
    </a>
  </nav>

  <!-- Toast Notification Container -->
  <div id="toast-container"></div>

  <!-- CSS untuk Mobile Hamburger Button -->
  <style>
    @media (max-width: 768px) {
      #btn-mobile-menu {
        display: flex !important;
      }
    }
  </style>

  <!-- JS Aplikasi Utama (Universal Bundle Tanpa Pembatasan CORS) -->
  <script src="js/app.js"></script>
</body>
</html>
